apiVersion: apps/v1
kind: Deployment
metadata:
  name: babu-app
  namespace: default
  labels:
    app: babu-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: babu-app
  template:
    metadata:
      labels:
        app: babu-app
    spec:
      containers:
        - name: babu-app
          image: YOUR_DOCKERHUB_USERNAME/babu-app:1.0.1
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: TZ
              value: "Asia/Kolkata"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
